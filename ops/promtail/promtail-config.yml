server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: tech-challenge-api-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: tech-challenge-api
          service: api
          __path__: /var/log/tech-challenge/*.log
