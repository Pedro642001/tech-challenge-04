services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tech-challenge-api
    environment:
      LOG_LEVEL: INFO
      LOG_FILE_PATH: /var/log/tech-challenge/api.log
      ENABLE_PROMETHEUS_METRICS: "true"
    ports:
      - "8000:8000"
    volumes:
      - api_logs:/var/log/tech-challenge
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: tech-challenge-prometheus
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api
    networks:
      - monitoring

  loki:
    image: grafana/loki:3.1.1
    container_name: tech-challenge-loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./ops/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - monitoring

  promtail:
    image: grafana/promtail:3.1.1
    container_name: tech-challenge-promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./ops/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - api_logs:/var/log/tech-challenge:ro
    depends_on:
      - loki
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:11.2.0
    container_name: tech-challenge-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ops/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./ops/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - monitoring

volumes:
  grafana_data:
  loki_data:
  api_logs:

networks:
  monitoring:
    driver: bridge
